receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 15s
    root_path: /hostfs
    scrapers:
      cpu:
      memory:
      load:
      filesystem:
      disk:
      network:
      paging:
      processes:
  prometheus/llama:
    config:
      scrape_configs:
        - job_name: "llama_cpp"
          scrape_interval: 15s
          metrics_path: /metrics
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 15s
          relabel_configs:
            - source_labels: [__meta_docker_container_label_com_docker_compose_service]
              regex: (job-analyzer|llama-cpp)
              action: keep
            - source_labels: [__meta_docker_port_private]
              regex: "8080"
              action: keep
            - source_labels: [__meta_docker_container_name]
              regex: "/(.*)"
              target_label: docker_container_name
              replacement: "$1"

processors:
  resource/enrich_env:
    attributes:
      - key: deployment.environment.name
        value: ${env:DEPLOY_ENV}
        action: upsert
  memory_limiter:
    check_interval: 2s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 1s
    send_batch_size: 1024
  transform/enrich:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(resource.attributes["deployment.environment.name"], "${env:DEPLOY_ENV}")
          - set(resource.attributes["service.name"], resource.attributes["container.name"]) where resource.attributes["container.name"] != nil
          - set(resource.attributes["service.name"], attributes["docker_container_name"]) where attributes["docker_container_name"] != nil
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["deployment.environment.name"], "${env:DEPLOY_ENV}")
          - set(resource.attributes["service.name"], resource.attributes["container.name"]) where resource.attributes["container.name"] != nil
    trace_statements:
      - context: span
        statements:
          - set(resource.attributes["deployment.environment.name"], "${env:DEPLOY_ENV}")
          - set(resource.attributes["service.name"], resource.attributes["container.name"]) where resource.attributes["container.name"] != nil

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  otlp_http/grafana_cloud:
    endpoint: https://otlp-gateway-prod-eu-west-0.grafana.net/otlp
    auth:
      authenticator: basicauth/grafana_cloud
    compression: gzip

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  basicauth/grafana_cloud:
    client_auth:
      username: ${GRAFANA_INSTANCE_ID}
      password: ${GRAFANA_TOKEN}

service:
  extensions: [health_check, basicauth/grafana_cloud]
  pipelines:
    metrics:
      receivers: [otlp, hostmetrics, prometheus/llama]
      processors: [memory_limiter, resource/enrich_env, transform/enrich, batch]
      exporters: [prometheus, otlp_http/grafana_cloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/enrich_env, transform/enrich, batch]
      exporters: [otlp_http/grafana_cloud]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/enrich_env, transform/enrich, batch]
      exporters: [otlp_http/grafana_cloud]
