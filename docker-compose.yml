x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
  OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
  SERVICE_VERSION: ${SERVICE_VERSION:-dev}
  DEPLOY_ENV: ${DEPLOY_ENV:-local}

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: rwct-otel-collector
    user: "0:0"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    env_file:
      - .env.secrets
    environment:
      DEPLOY_ENV: ${DEPLOY_ENV:-local}
    volumes:
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "8888:8888"
      - "13133:13133"

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: rwct-prometheus
    profiles: ["obs"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  loki:
    image: grafana/loki:3.5.0
    container_name: rwct-loki
    profiles: ["obs"]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.8.2
    container_name: rwct-tempo
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: rwct-grafana
    profiles: ["obs"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  llm-mock:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: llm-mock
    container_name: rwct-llm-mock
    profiles: ["dev"]
    environment:
      <<: *otel-env
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  test-rss:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: test-rss
    container_name: rwct-test-rss
    profiles: ["dev", "prod"]
    ports:
      - "${TEST_RSS_PORT:-8095}:8095"
    environment:
      <<: *otel-env
      TEST_RSS_PORT: 8095
      TEST_RSS_BASE_URL: http://test-rss:8095
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8095/healthz | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: rwct-llama-cpp
    profiles: ["standalone-llama"]
    command: ["-m", "/models/${LLM_MODEL_FILE}", "--host", "0.0.0.0", "--port", "8080", "-c", "2048", "-ngl", "0", "-t", "${LLM_PARALLEL_THREADS:--1}"]
    volumes:
      - ${LLM_MODELS_DIR:-./models}:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || curl -fsS http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  rss-reader:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: rss-reader
    container_name: rwct-rss-reader
    profiles: ["dev", "prod"]
    env_file:
      - .env
      - .env.secrets
    environment:
      <<: *otel-env
      HEALTH_PORT: 8081
      RSS_POLL_INTERVAL: 1m
    depends_on:
      test-rss:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - rwct-data:/data
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/healthz | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5

  scrapling-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.scrapling-sidecar
    container_name: rwct-scrapling-sidecar
    profiles: ["dev", "prod"]
    ports:
      - "8088:8088"
    environment:
      <<: *otel-env
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5

  job-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer-llama
    profiles: ["dev", "prod"]
    env_file:
      - .env
      - .env.secrets
    environment:
      <<: *otel-env
      HEALTH_PORT: 8082
      LLM_ENDPOINT: http://127.0.0.1:8080
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8080
      LLAMA_CTX: ${LLAMA_CTX:-4096}
      LLAMA_NGL: 0
      LLM_PARALLEL_THREADS: ${LLM_PARALLEL_THREADS:--1}
    depends_on:
      scrapling-sidecar:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - rwct-data:/data
      - ./configs:/app/configs:ro
      - ${LLM_MODELS_DIR:-./models}:/models:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/healthz | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5

  message-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: message-dispatcher
    container_name: rwct-message-dispatcher
    profiles: ["dev", "prod"]
    env_file:
      - .env
      - .env.secrets
    environment:
      <<: *otel-env
      HEALTH_PORT: 8083
      DESTINATION_MODE: ${DESTINATION_MODE:-file}
    depends_on:
      otel-collector:
        condition: service_started
    volumes:
      - rwct-data:/data
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/healthz | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5

  web-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: web-admin
    container_name: rwct-web-admin
    profiles: ["dev", "prod"]
    env_file:
      - .env
      - .env.secrets
    environment:
      <<: *otel-env
      WEB_ADMIN_PORT: ${WEB_ADMIN_PORT:-8090}
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "${WEB_ADMIN_PORT:-8090}:${WEB_ADMIN_PORT:-8090}"
    volumes:
      - rwct-data:/data
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${WEB_ADMIN_PORT:-8090}/healthz | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  rwct-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
